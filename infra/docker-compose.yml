name: odin

services:
  postgres:
    image: postgres:16-alpine
    container_name: odin-postgres
    ports:
      - "47132:5432"
    environment:
      POSTGRES_DB: odin
      POSTGRES_USER: odin
      POSTGRES_PASSWORD: odin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odin -d odin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: odin-redis
    ports:
      - "47179:6379"
    volumes:
      - redis_data:/data

  questdb:
    image: questdb/questdb:latest
    container_name: odin-questdb
    ports:
      - "47900:9000"
      - "47909:9009"
    volumes:
      - questdb_data:/var/lib/questdb
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  odin-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: odin-api
    ports:
      - "47100:8000"
    environment:
      - REDIS_URL=redis://odin-redis:6379/0
      - DATABASE_URL=postgresql://odin:odin@odin-postgres:5432/odin
      - QUESTDB_HOST=odin-questdb
      - QUESTDB_PORT=9000
      - USE_REDIS=true
      - USE_POSTGRES=true
      - USE_QUESTDB=true
    depends_on:
      postgres:
        condition: service_healthy
      questdb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../data:/app/data

volumes:
  postgres_data:
  redis_data:
  questdb_data:
