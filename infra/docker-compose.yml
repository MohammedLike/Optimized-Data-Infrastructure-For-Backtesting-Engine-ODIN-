# ODIN Docker stack — project name, containers, and host ports
# Host ports use 47xxx to avoid clashes with other local projects.

name: odin

services:
  postgres:
    image: postgres:16-alpine
    container_name: odin-postgres
    ports:
      - "47132:5432"
    environment:
      POSTGRES_DB: odin
      POSTGRES_USER: odin
      POSTGRES_PASSWORD: odin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odin -d odin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: odin-redis
    ports:
      - "47179:6379"
    volumes:
      - redis_data:/data

  odin-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: odin-api
    ports:
      - "47100:8000"
    environment:
      - REDIS_URL=redis://odin-redis:6379/0
      - DATABASE_URL=postgresql://odin:odin@odin-postgres:5432/odin
      - USE_REDIS=true
      - USE_POSTGRES=true
      - USE_QUESTDB=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../data:/app/data

volumes:
  postgres_data:
  redis_data:
