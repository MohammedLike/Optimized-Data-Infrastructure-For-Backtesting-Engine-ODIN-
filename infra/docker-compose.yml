services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  odin-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - USE_QUESTDB=false
    depends_on:
      - redis
    volumes:
      - ../data:/app/data

volumes:
  redis_data:
